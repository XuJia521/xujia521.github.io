<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>彭高红 · 法律工具集</title>

<!-- PWA 基础 -->
<link rel="manifest" href="/pgh/manifest.json">
<meta name="theme-color" content="#f5efe0">
<meta name="description" content="彭高红律师的常用法律计算与辅助工具集合">

<!-- iOS PWA 支持 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="法律工具">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <header>
    <div class="seal" id="seal"></div>
    <h1 id="title">法律工具</h1>
    <p class="subtitle" id="subtitle" style="display:none"></p>
  </header>

  <nav class="card" id="toolList"></nav>

  <div class="summary">
    <span class="indicator"></span><span id="toolCount"></span>
  </div>

  <footer id="footer"></footer>
</div>

<!-- 安装提示（安卓 Chrome 会触发 beforeinstallprompt） -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <div class="install-banner-title">添加到主屏幕</div>
    <div class="install-banner-desc">像原生应用一样打开，支持离线访问</div>
  </div>
  <button class="install-btn" id="installBtn">安装</button>
  <button class="install-close" id="installClose" aria-label="关闭">×</button>
</div>

<script>
  window.PROFILE = {
    pageTitle: '彭高红 · 法律工具集',
    seal: '彭',
    title: '法律工具',
    subtitle: '彭高红 · 广东金桥百信律师事务所',
    footer: ''
  };
</script>
<script src="/tools.js"></script>
<script src="/home.js"></script>
</body>
</html>
