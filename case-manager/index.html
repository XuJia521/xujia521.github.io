    <style>
        :root {
            --bg: #f5f4ed;
            --card-bg: rgba(255, 255, 255, 0.75);
            --primary: #d97757;
            --primary-strong: #c15f3c;
            --text: #1f1e1d;
            --text-dim: #73726c;
            --border: rgba(0, 0, 0, 0.1);
            --danger: #c0392b;
            --success: #3d9a50;
            --title: #1f1e1d;
            --remark-bg: rgba(0, 0, 0, 0.04);
            --remark-text: #57544e;
            --modal-bg: #faf9f5;
            --bar-bg: rgba(245, 244, 237, 0.9);
            --glow-1: rgba(217, 119, 87, 0.06);
            --glow-2: rgba(217, 119, 87, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #262624;
                --card-bg: rgba(255, 255, 255, 0.05);
                --primary: #d97757;
                --primary-strong: #e08a6b;
                --text: #f5f4ee;
                --text-dim: #a3a097;
                --border: rgba(255, 255, 255, 0.12);
                --danger: #e07a6f;
                --success: #5cba6e;
                --title: #f5f4ee;
                --remark-bg: rgba(255, 255, 255, 0.05);
                --remark-text: #c9c6bd;
                --modal-bg: #30302d;
                --bar-bg: rgba(38, 38, 36, 0.92);
                --glow-1: rgba(217, 119, 87, 0.1);
                --glow-2: rgba(217, 119, 87, 0.06);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            color-scheme: light dark;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, var(--glow-1), transparent),
                              radial-gradient(circle at bottom left, var(--glow-2), transparent);
            color: var(--text);
            line-height: 1.6;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.12s ease;
        }

        .stat-card:active {
            background: rgba(217, 119, 87, 0.18);
            transform: scale(0.97);
        }

        @media (hover: hover) {
            .stat-card:hover {
                border-color: var(--primary);
            }
        }

        .stat-card.active {
            border-color: var(--primary);
            background: rgba(217, 119, 87, 0.12);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-wrap {
            position: relative;
        }

        .search-clear {
            display: none;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            background: rgba(100, 116, 139, 0.25);
            border-radius: 50%;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .search-clear.visible {
            display: block;
        }

        .case-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .case-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            cursor: pointer;
            animation: fadeIn 0.3s ease-out;
            transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .case-card:active {
            transform: scale(0.985);
            border-color: var(--primary);
        }

        @media (hover: hover) {
            .case-card:hover {
                border-color: var(--primary);
                box-shadow: 0 4px 16px rgba(217, 119, 87, 0.14);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .case-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--title);
        }

        .case-badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            background: var(--badge-bg, rgba(217, 119, 87, 0.14));
            color: var(--badge-fg, #c15f3c);
            border: 1px solid var(--badge-bg, rgba(217, 119, 87, 0.14));
        }

        /* 按案件阶段区分徽章配色（暖色系，避免紫色） */
        .case-badge.badge-litigation { --badge-bg: rgba(217, 119, 87, 0.14); --badge-fg: #c15f3c; }
        .case-badge.badge-exec       { --badge-bg: rgba(193, 138, 47, 0.16); --badge-fg: #a87521; }
        .case-badge.badge-arb        { --badge-bg: rgba(60, 130, 120, 0.16); --badge-fg: #2f7a6e; }
        .case-badge.badge-pending    { --badge-bg: rgba(120, 116, 108, 0.16); --badge-fg: #73726c; }
        .case-badge.badge-done       { --badge-bg: rgba(61, 154, 80, 0.16);  --badge-fg: #3d8a4c; }

        @media (prefers-color-scheme: dark) {
            .case-badge.badge-litigation { --badge-fg: #e89a7e; }
            .case-badge.badge-exec       { --badge-fg: #d9b061; }
            .case-badge.badge-arb        { --badge-fg: #6fc2b3; }
            .case-badge.badge-pending    { --badge-fg: #b8b5ac; }
            .case-badge.badge-done       { --badge-fg: #6fc77f; }
        }

        .case-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.85rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: var(--text-dim);
            font-size: 0.7rem;
        }

        .info-value {
            overflow-wrap: anywhere;
            min-height: 1.4em;
        }

        .case-remark {
            margin-top: 12px;
            padding: 8px;
            background: var(--remark-bg);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--remark-text);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .case-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: transform 0.12s ease, background 0.2s ease;
        }

        .btn-icon:active {
            transform: scale(0.9);
            background: rgba(239, 68, 68, 0.12);
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bar-bg);
            backdrop-filter: blur(20px);
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .btn-main {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(217, 119, 87, 0.3);
            transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(217, 119, 87, 0.25);
        }

        @media (hover: hover) {
            .btn-main:hover { filter: brightness(1.05); }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: var(--modal-bg);
            border-radius: 16px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            margin-top: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--title);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            max-width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-cancel {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.2s ease;
        }

        .btn-cancel:active {
            transform: scale(0.97);
            background: var(--remark-bg);
        }

        .btn-save {
            flex: 1;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.2s ease;
        }

        .btn-save:active {
            transform: scale(0.97);
        }

        @media (hover: hover) {
            .btn-save:hover { filter: brightness(1.05); }
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s ease, transform 0.12s ease;
        }

        .header-btn:active {
            transform: scale(0.94);
            color: var(--primary);
        }

        /* 电话输入框带拨打按钮 */
        .phone-input-group {
            display: flex;
            gap: 8px;
        }

        .phone-input-group .form-input {
            flex: 1;
        }

        .btn-call {
            background: var(--success);
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-call:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>在办案件</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="exportData()">导出</button>
            <button class="header-btn" onclick="importData()">导入</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card" onclick="filterBy('all')">
            <span class="stat-value" id="totalCount">0</span>
            <span class="stat-label">总数</span>
        </div>
        <div class="stat-card" onclick="filterBy('pending')">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">待跟进</span>
        </div>
        <div class="stat-card" onclick="filterBy('week')">
            <span class="stat-value" id="weekCount">0</span>
            <span class="stat-label">本周</span>
        </div>
    </div>

    <div class="controls">
        <div class="search-wrap">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索当事人、案号..." oninput="onSearchInput()">
            <span id="clearSearch" class="search-clear" ontouchend="clearSearch(event)" onclick="clearSearch(event)">✕</span>
        </div>
    </div>

    <div class="case-list" id="caseList"></div>

    <div class="bottom-bar">
        <button class="btn-main" onclick="openModal()">新增案件</button>
    </div>

    <div class="modal" id="caseModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">新增案件</h2>
            <input type="hidden" id="editId">

            <div class="form-group">
                <label class="form-label">当事人</label>
                <input type="text" id="f_client" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">案号</label>
                <input type="text" id="f_caseNo" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">代理方</label>
                <select id="f_party" class="form-input">
                    <option value="原告">原告</option>
                    <option value="被告">被告</option>
                    <option value="申请人">申请人</option>
                    <option value="被申请人">被申请人</option>
                    <option value="上诉人">上诉人</option>
                    <option value="被上诉人">被上诉人</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">阶段</label>
                <select id="f_stage" class="form-input">
                    <option value="一审">一审</option>
                    <option value="二审">二审</option>
                    <option value="执行">执行</option>
                    <option value="待分配">待分配</option>
                    <option value="仲裁">仲裁</option>
                    <option value="劳动仲裁">劳动仲裁</option>
                    <option value="已结案">已结案</option>
                    <option value="调档">调档</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">受理机构</label>
                <input type="text" id="f_court" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">承办人电话</label>
                <div class="phone-input-group">
                    <input type="text" id="f_judgePhone" class="form-input">
                    <button type="button" class="btn-call" onclick="callPhone('f_judgePhone')">📞</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">助理电话</label>
                <div class="phone-input-group">
                    <input type="text" id="f_assistantPhone" class="form-input">
                    <button type="button" class="btn-call" onclick="callPhone('f_assistantPhone')">📞</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">跟进日期</label>
                <input type="date" id="f_followDate" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">备注</label>
                <textarea id="f_remark" class="form-input" rows="3"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" onclick="saveCase()">保存</button>
            </div>
        </div>
    </div>

    <input type="file" id="importFile" style="display:none" onchange="handleImport(event)">

    <script>
        let cases = JSON.parse(localStorage.getItem('caseManagement_mobile') || '[]');
        let currentFilter = 'all'; // 当前筛选条件

        function saveToStorage() {
            localStorage.setItem('caseManagement_mobile', JSON.stringify(cases));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = cases.length;
            const today = new Date().toISOString().split('T')[0];
            const pending = cases.filter(c => c.followDate >= today).length;
            document.getElementById('pendingCount').textContent = pending;
            
            const now = new Date();
            const weekEnd = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const week = cases.filter(c => c.followDate >= today && c.followDate <= weekEnd).length;
            document.getElementById('weekCount').textContent = week;
        }

        function filterBy(type) {
            currentFilter = type;
            
            // 更新卡片选中状态
            document.querySelectorAll('.stat-card').forEach((card, index) => {
                card.classList.remove('active');
                if ((type === 'all' && index === 0) || 
                    (type === 'pending' && index === 1) || 
                    (type === 'week' && index === 2)) {
                    card.classList.add('active');
                }
            });
            
            renderList();
        }

        // 转义用户输入，防止 XSS（备注/当事人等会插入 innerHTML）
        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 根据案件阶段返回徽章配色类
        function stageBadgeClass(stage) {
            switch (stage) {
                case '已结案': return 'badge-done';
                case '执行': return 'badge-exec';
                case '仲裁':
                case '劳动仲裁': return 'badge-arb';
                case '待分配':
                case '调档': return 'badge-pending';
                default: return 'badge-litigation';
            }
        }

        function renderList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listElement = document.getElementById('caseList');
            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            const weekEnd = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            let filtered = cases;
            
            // 先按筛选条件过滤
            if (currentFilter === 'pending') {
                filtered = cases.filter(c => c.followDate >= today);
            } else if (currentFilter === 'week') {
                filtered = cases.filter(c => c.followDate >= today && c.followDate <= weekEnd);
            }
            
            // 再按搜索词过滤
            filtered = filtered.filter(c => 
                (c.client || '').toLowerCase().includes(searchTerm) || 
                (c.caseNo || '').toLowerCase().includes(searchTerm) ||
                (c.stage || '').toLowerCase().includes(searchTerm)
            );

            listElement.innerHTML = filtered.map(c => `
                <div class="case-card" onclick="editCase(${c.id})">
                    <div class="case-header">
                        <span class="case-title">${escapeHtml(c.client) || '未填写当事人'}</span>
                        <span class="case-badge ${stageBadgeClass(c.stage)}">${escapeHtml(c.stage) || '未知阶段'}</span>
                    </div>
                    <div class="case-info-grid">
                        <div class="info-item">
                            <span class="info-label">案号</span>
                            <span class="info-value">${escapeHtml(c.caseNo) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">代理方</span>
                            <span class="info-value">${escapeHtml(c.party) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">受理机构</span>
                            <span class="info-value">${escapeHtml(c.court) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">跟进日期</span>
                            <span class="info-value">${escapeHtml(c.followDate) || '-'}</span>
                        </div>
                    </div>
                    ${c.remark ? `<div class="case-remark">${escapeHtml(c.remark)}</div>` : ''}
                    <div class="case-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteCase(${c.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            if (filtered.length === 0) {
                listElement.innerHTML = '<div style="text-align:center; color:var(--text-dim); margin-top:40px;">暂无案件数据</div>';
            }
        }

        function openModal(id = null) {
            const modal = document.getElementById('caseModal');
            const title = document.getElementById('modalTitle');
            const editId = document.getElementById('editId');
            
            if (id) {
                const c = cases.find(x => x.id === id);
                title.textContent = '编辑案件';
                editId.value = id;
                document.getElementById('f_client').value = c.client || '';
                document.getElementById('f_caseNo').value = c.caseNo || '';
                document.getElementById('f_party').value = c.party || '原告';
                document.getElementById('f_stage').value = c.stage || '一审';
                document.getElementById('f_court').value = c.court || '';
                document.getElementById('f_judgePhone').value = c.judgePhone || '';
                document.getElementById('f_assistantPhone').value = c.assistantPhone || '';
                document.getElementById('f_followDate').value = c.followDate || '';
                document.getElementById('f_remark').value = c.remark || '';
            } else {
                title.textContent = '新增案件';
                editId.value = '';
                document.querySelectorAll('.form-input').forEach(i => i.value = '');
                document.getElementById('f_party').value = '原告';
                document.getElementById('f_stage').value = '一审';
            }
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('caseModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function saveCase() {
            const id = document.getElementById('editId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                client: document.getElementById('f_client').value,
                caseNo: document.getElementById('f_caseNo').value,
                party: document.getElementById('f_party').value,
                stage: document.getElementById('f_stage').value,
                court: document.getElementById('f_court').value,
                judgePhone: document.getElementById('f_judgePhone').value,
                assistantPhone: document.getElementById('f_assistantPhone').value,
                followDate: document.getElementById('f_followDate').value,
                remark: document.getElementById('f_remark').value
            };

            if (id) {
                const index = cases.findIndex(x => x.id === parseInt(id));
                cases[index] = data;
            } else {
                cases.unshift(data);
            }

            saveToStorage();
            renderList();
            closeModal();
        }

        function editCase(id) {
            openModal(id);
        }

        function deleteCase(id) {
            if (confirm('确定删除该案件吗？')) {
                cases = cases.filter(x => x.id !== id);
                saveToStorage();
                renderList();
            }
        }

        // 拨打电话功能
        function callPhone(inputId) {
            const phoneInput = document.getElementById(inputId);
            const phoneValue = phoneInput.value.trim();
            
            if (!phoneValue) {
                alert('请先输入电话号码');
                return;
            }
            
            // 提取电话号码（支持格式：姓名：电话 或 纯电话）
            let phoneNumber = phoneValue;
            if (phoneValue.includes('：')) {
                phoneNumber = phoneValue.split('：').pop().trim();
            } else if (phoneValue.includes(':')) {
                phoneNumber = phoneValue.split(':').pop().trim();
            }
            
            // 去除非数字字符（保留+号和-号）
            phoneNumber = phoneNumber.replace(/[^\d+\-]/g, '');
            
            if (!phoneNumber) {
                alert('未找到有效的电话号码');
                return;
            }
            
            // 拨打电话
            window.location.href = 'tel:' + phoneNumber;
        }

        function exportData() {
            const data = JSON.stringify(cases);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = now.getFullYear().toString() +
                String(now.getMonth() + 1).padStart(2, '0') +
                String(now.getDate()).padStart(2, '0');
            a.download = '案件数据_' + dateStr + '.json';
            a.click();
        }

        function importData() {
            document.getElementById('importFile').click();
        }

        function handleImport(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    cases = data;
                    saveToStorage();
                    renderList();
                    alert('导入成功');
                } catch (err) {
                    alert('导入失败');
                }
            };
            reader.readAsText(file);
        }

        function onSearchInput() {
            var btn = document.getElementById('clearSearch');
            btn.classList.toggle('visible', !!document.getElementById('searchInput').value);
            renderList();
        }

        function clearSearch(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.remove('visible');
            currentFilter = 'all';
            document.querySelectorAll('.stat-card').forEach(function(c) { c.classList.remove('active'); });
            updateStats();
            renderList();
        }

        updateStats();
        renderList();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./service-worker.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
